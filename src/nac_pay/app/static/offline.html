<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — NAC Pay Tracker</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      max-width: 22rem;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { color: #94a3b8; line-height: 1.5; margin: 0.5rem 0; }
    button {
      margin-top: 1.25rem;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      border: 0;
      border-radius: 0.5rem;
      background: #6366f1;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>This page hasn't been synced for offline use yet.</p>
    <p>Reconnect to load it, then it'll be available offline next time.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
